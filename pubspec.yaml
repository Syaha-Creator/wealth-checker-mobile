name: wealth_checker_mobile
description: "Wealth Checker Mobile — Flutter client for Wealth Checker API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.3.0
  flutter_secure_storage: ^10.3.1
  fl_chart: ^1.2.0
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.2
  google_fonts: ^6.2.1
  firebase_messaging: ^16.4.1
  firebase_core: ^4.11.0
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  freezed: ^3.2.3
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
